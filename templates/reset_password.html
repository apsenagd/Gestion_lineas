<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Restablecer contraseña</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;color:#0f172a}
    body{display:grid;place-items:center;background:#f3f6f7}
    .card{width:640px;max-width:92%;background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(2,6,23,0.12);overflow:hidden}
    .body{padding:28px}
    label{display:block;font-weight:700;margin-bottom:6px;font-size:13px}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid #e6eef0;margin-bottom:12px}
    .btn{display:inline-block;padding:10px 16px;background:#198754;color:#fff;border-radius:8px;border:none;font-weight:700;cursor:pointer}
    .small{font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="card">
    <div class="body">
      <h1>Restablecer contraseña</h1>
      <p class="small">Ingrese y confirme su nueva contraseña.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="margin-bottom:12px;color:#b00020">
            {% for cat,msg in messages %}{{ msg }}{% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" style="max-width:520px;margin-top:12px">
        <label>Nueva contraseña</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="new_password" name="password" type="password" required style="flex:1">
          <button id="toggle_new_pwd" type="button" class="small" style="background:transparent;border:none;cursor:pointer;color:#198754;font-weight:700" onclick="togglePassword('new_password','toggle_new_pwd')">Mostrar</button>
        </div>
        <label>Confirmar contraseña</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="confirm_password" name="confirm" type="password" required style="flex:1">
          <button id="toggle_confirm_pwd" type="button" class="small" style="background:transparent;border:none;cursor:pointer;color:#198754;font-weight:700" onclick="togglePassword('confirm_password','toggle_confirm_pwd')">Mostrar</button>
        </div>
        <div style="text-align:right"><button class="btn" type="submit">RESTABLECER</button></div>
      </form>

      <div style="margin-top:18px"><a href="{{ url_for('login') }}">Volver al ingreso</a></div>
    </div>
  </div>
    <script>
      function togglePassword(fieldId, btnId){
        var inp = document.getElementById(fieldId);
        var btn = document.getElementById(btnId);
        if(!inp) return;
        if(inp.type === 'password'){
          inp.type = 'text';
          if(btn) btn.textContent = 'Ocultar';
        } else {
          inp.type = 'password';
          if(btn) btn.textContent = 'Mostrar';
        }
      }
    </script>
</body>
</html>
